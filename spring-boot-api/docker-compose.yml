services:
  mysql:
    image: mysql:8.4
    container_name: syos-erp-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-syos_erp}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-syos}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-syospassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - syos_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syos-erp-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SYOS_DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-syos_erp}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SYOS_DB_USERNAME: ${MYSQL_USER:-syos}
      SYOS_DB_PASSWORD: ${MYSQL_PASSWORD:-syospassword}
      SYOS_API_PORT: 8080
    ports:
      - "${SYOS_API_PORT:-8080}:8080"

volumes:
  syos_mysql_data:
